 Box. Contains encoded audio, video, or subtitle bytes.`,whyItMatters:`This is the payload the decoder ultimately consumes after metadata explains how to parse it.`},{id:`moof`,label:`moof`,category:`fragmented-mp4`,description:`Movie Fragment Box. Contains metadata for one media fragment.`,whyItMatters:`In fMP4 streaming, each media segment needs moof metadata so the player can interpret the mdat bytes.`},{id:`traf`,label:`traf`,category:`fragmented-mp4`,description:`Track Fragment Box. Holds fragment metadata for one track.`,whyItMatters:`Fragments can carry multiple tracks, each with its own traf metadata.`},{id:`tfhd`,label:`tfhd`,category:`fragmented-mp4`,description:`Track Fragment Header Box. Identifies the track and provides defaults.`,whyItMatters:`Default sample values reduce repetition and tell the player which track the fragment belongs to.`},{id:`tfdt`,label:`tfdt`,category:`timing`,description:`Track Fragment Decode Time Box. Gives the base decode time for the fragment.`,whyItMatters:`It places a fragment on the media timeline for smooth playback and ABR alignment.`},{id:`trun`,label:`trun`,category:`sample-table`,description:`Track Run Box. Describes samples inside a media fragment.`,whyItMatters:`Acts like a mini sample table for a segment, listing sample sizes, durations, and flags.`}],Hl=[{source:`mp4-file`,target:`progressive-mp4`,label:`can be`,description:`An MP4 file can be authored as a progressive MP4 for single-file playback.`},{source:`mp4-file`,target:`fragmented-mp4`,label:`can be`,description:`An MP4 file can be fragmented for streaming and incremental playback.`},{source:`progressive-mp4`,target:`ftyp`,label:`contains`,description:`A progressive MP4 contains an ftyp box declaring compatible brands.`},{source:`progressive-mp4`,target:`moov`,label:`contains`,description:`A progressive MP4 contains a moov box with global metadata and sample tables.`},{source:`progressive-mp4`,target:`mdat`,label:`contains`,description:`A progressive MP4 co
